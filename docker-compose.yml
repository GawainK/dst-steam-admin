# Fixed project name so the admin-api container (cwd /app) and the host CLI
# (cwd ~/dst-steam-admin) resolve the SAME compose project and control the same
# containers. Without it the project name defaults to the directory basename,
# so admin-api ("app") and the CLI ("dst-steam-admin") diverge and the UI shows
# the server as stopped even while it is running.
name: dst-steam-admin

services:
  admin-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      PORT: 3000
      PROJECT_ROOT: /app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    # 仅绑定到本机环回地址：admin-web 通过 compose 内网 (admin-api:3000) 访问，
    # 无需把控制 API 暴露到公网。本机映射仅方便调试。
    ports:
      - "127.0.0.1:3000:3000"

  admin-web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      - admin-api
    environment:
      # 后台 Basic Auth 凭据；未设置 BASIC_AUTH_PASSWORD 时容器会拒绝启动。
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
    ports:
      - "8080:80"

  dst-master:
    build:
      context: .
      dockerfile: docker/dst/Dockerfile
    environment:
      # 房间名/密码/模式/人数等「世界配置」由后台写入的
      # data/cluster/admin/server-config.json 提供，render-config.sh 会读取它。
      # 这里不再写死 DST_CLUSTER_NAME 等，否则 env 会覆盖后台配置导致改了不生效。
      # 仅保留每个分片必需的基础设施变量。
      DST_SERVER_PORT: "10999"
      DST_SHARD: Master
      # 启动时按 buildid 比对 Steam 最新版，版本相同则跳过下载、不同才更新。
      # 想完全离线/不检查更新，可设 DST_SKIP_UPDATE: "1"（代价：不再自动更新）。
    volumes:
      - ./data/cluster:/var/lib/dst/cluster
      - ./data/mods:/var/lib/dst/mods
      - ./data/install/master:/opt/dst
      # 持久化 SteamCMD 自身与其 home，避免每次重建容器重下 ~40MB 客户端。
      # 各分片独立目录，防止并发启动时 SteamCMD 互相抢锁。
      - ./data/steamcmd/master:/opt/steamcmd
      - ./data/steamcmd/master-home:/root/Steam
    ports:
      - "10999:10999/udp"

  dst-caves:
    build:
      context: .
      dockerfile: docker/dst/Dockerfile
    environment:
      # 同 dst-master：房间名/密码/模式/人数由后台 server-config.json 提供，
      # 不在此写死，避免 env 覆盖后台配置。仅保留分片基础设施变量。
      DST_SERVER_PORT: "11000"
      DST_SHARD: Caves
      # 同 dst-master：按 buildid 比对决定是否更新；DST_SKIP_UPDATE: "1" 可关闭检查。
    volumes:
      - ./data/cluster:/var/lib/dst/cluster
      - ./data/mods:/var/lib/dst/mods
      - ./data/install/caves:/opt/dst
      # 独立的 SteamCMD 持久化目录（与 master 分开，避免抢锁）。
      - ./data/steamcmd/caves:/opt/steamcmd
      - ./data/steamcmd/caves-home:/root/Steam
    ports:
      - "11000:11000/udp"
