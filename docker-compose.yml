services:
  admin-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      PORT: 3000
      PROJECT_ROOT: /app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    ports:
      - "3000:3000"

  admin-web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      - admin-api
    ports:
      - "8080:80"

  dst-master:
    build:
      context: .
      dockerfile: docker/dst/Dockerfile
    environment:
      DST_CLUSTER_NAME: DST Steam Admin
      DST_CLUSTER_PASSWORD: ""
      DST_GAME_MODE: survival
      DST_MAX_PLAYERS: "6"
      DST_SERVER_PORT: "10999"
      DST_SHARD: Master
    volumes:
      - ./data/cluster:/var/lib/dst/cluster
      - ./data/mods:/var/lib/dst/mods
    ports:
      - "10999:10999/udp"

  dst-caves:
    build:
      context: .
      dockerfile: docker/dst/Dockerfile
    environment:
      DST_CLUSTER_NAME: DST Steam Admin
      DST_CLUSTER_PASSWORD: ""
      DST_GAME_MODE: survival
      DST_MAX_PLAYERS: "6"
      DST_SERVER_PORT: "11000"
      DST_SHARD: Caves
    volumes:
      - ./data/cluster:/var/lib/dst/cluster
      - ./data/mods:/var/lib/dst/mods
    ports:
      - "11000:11000/udp"
